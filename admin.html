<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Cadastro - M&D Store</title>
    <style>
        :root {
            --green: #4d7433;
            --gold: #d0be7f;
            --light: #f9f9f9;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--light);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .card-admin {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 { color: var(--green); text-align: center; font-size: 24px; }
        p { text-align: center; color: #666; margin-bottom: 25px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--green); }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #eee; 
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); outline: none; }

        #preview {
            width: 100%;
            height: 150px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f0f0f0;
        }
        #preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--green); 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #3a5926; transform: scale(1.02); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

    <div class="card-admin">
        <h1>📦 Cadastro de Produtos</h1>
        <p>Preencha os dados abaixo para o item aparecer no site.</p>

        <label>Nome do Produto</label>
        <input id="nome" placeholder="Ex: Copo Térmico 1200ml">

        <label>Preço (R$)</label>
        <input id="preco" type="number" step="0.01" placeholder="Ex: 80.00">

        <label>Link da Foto (URL)</label>
        <input id="imagem" placeholder="Cole o link da imagem aqui" oninput="mostrarPreview()">

        <div id="preview"><span>Prévia da foto aparecerá aqui</span></div>

        <button id="btn">🚀 PUBLICAR NO SITE</button>

        <a href="index.html" class="back-link">← Voltar para a Loja</a>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://dhigljnbkxqjbfnazken.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoaWdsam5ia3hxamJmbmF6a2VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg5ODExNDEsImV4cCI6MjA1NDU1NzE0MX0.OdnoinCDr9bipJ1zUutjtVrqP8lgfg8wIQaGJiG7KSM';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para mostrar a foto enquanto digita
        window.mostrarPreview = function() {
            const url = document.getElementById("imagem").value;
            const previewDiv = document.getElementById("preview");
            if(url) {
                previewDiv.innerHTML = `<img src="${url}">`;
            } else {
                previewDiv.innerHTML = `<span>Prévia da foto aparecerá aqui</span>`;
            }
        }

        document.getElementById("btn").onclick = async function(){
            const nome = document.getElementById("nome").value;
            const preco = parseFloat(document.getElementById("preco").value);
            const imagem = document.getElementById("imagem").value;

            if(!nome || !preco || !imagem) {
                return alert("⚠️ Por favor, preencha todos os campos!");
            }

            // Desativa o botão para evitar cliques duplos
            const btn = document.getElementById("btn");
            btn.disabled = true;
            btn.innerText = "Salvando...";

            const { data, error } = await supabase
                .from('produtos')
                .insert([{ nome, preco, imagem }]);

            if (error) {
                alert("❌ Erro ao salvar: " + error.message);
                btn.disabled = false;
                btn.innerText = "🚀 PUBLICAR NO SITE";
            } else {
                alert("✅ PRODUTO CADASTRADO COM SUCESSO!");
                // Limpa tudo para o próximo cadastro
                document.getElementById("nome").value = "";
                document.getElementById("preco").value = "";
                document.getElementById("imagem").value = "";
                document.getElementById("preview").innerHTML = "<span>Prévia da foto aparecerá aqui</span>";
                btn.disabled = false;
                btn.innerText = "🚀 PUBLICAR NO SITE";
            }
        };
    </script>
</body>
</html>
